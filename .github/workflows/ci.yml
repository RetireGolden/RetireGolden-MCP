name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  matrix-test:
    name: test (${{ matrix.os }}, ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  # Single stable check name for branch protection ("test"), independent of the
  # matrix shape. Fails unless every matrix leg succeeded.
  test:
    runs-on: ubuntu-latest
    needs: matrix-test
    if: always()
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.matrix-test.result }}" != "success" ]; then
            echo "Matrix result: ${{ needs.matrix-test.result }}" >&2
            exit 1
          fi
