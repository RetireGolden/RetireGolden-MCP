# CLA Assistant

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant Lite
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
        with:
          remote-organization-name: RetireGolden
          remote-repository-name: cla-signatures
          path-to-signatures: signatures/v1/cla.json
          path-to-document: https://github.com/RetireGolden/RetireGolden-MCP/blob/main/CLA.md
          branch: main
          allowlist: FlyOverCoderKY,*[bot]
          custom-notsigned-prcomment: >
            Thank you for your contribution to RetireGolden-MCP! Before we can merge,
            please sign our
            [Individual Contributor License Agreement](https://github.com/RetireGolden/RetireGolden-MCP/blob/main/CLA.md)
            (see [CONTRIBUTING.md](https://github.com/RetireGolden/RetireGolden-MCP/blob/main/CONTRIBUTING.md)).
            To sign, post the comment below.
