# Publishes @retiregolden/mcp to npm.
#
# Trigger by pushing a tag `mcp-v<version>` (must match package.json version),
# or manually via workflow_dispatch (defaults to dry-run).
#
# Publishes via npm Trusted Publishing (OIDC): the @retiregolden/mcp package on
# npmjs.com is configured with a trusted publisher pinned to this repo, this
# workflow filename, and the `npm-publish` environment, so no long-lived token
# is needed. This requires npm >= 11.5.1, which is newer than the npm bundled
# with Node 22 — hence the explicit `npm install -g npm@latest` step below.
# There is no NPM_TOKEN: token-based publishing has been retired, and the npm
# package is set to disallow tokens, so releases authenticate only via OIDC.
#
# The publish job runs in the `npm-publish` environment, which requires manual
# approval from FlyOverCoderKY before any release. Its deployment branch policy
# allows the tag pattern `mcp-v*` plus the `main` branch; `main` is permitted
# only so dry-runs can be dispatched, and the `guard` job below is what keeps a
# dispatch from ever becoming a real publish. Self-review is deliberately
# allowed (single-maintainer org — otherwise every release deadlocks).

name: Publish mcp package

on:
  push:
    tags: ["mcp-v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Use npm publish --dry-run (no release)
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write

jobs:
  # Real publishes must originate from an `mcp-v*` tag push, because the tag is
  # what triggers the version-consistency check below. A manual dispatch skips
  # that check, so dispatch is dry-run only. This guard deliberately lives in
  # its own ungated job: the `npm-publish` environment pauses `publish` for
  # approval before any of its steps run, so a guard inside that job would only
  # fire after a reviewer had already approved the deployment.
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Reject non-dry-run manual dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false'
        run: |
          echo "Manual dispatch is dry-run only. To publish for real, push a tag mcp-v<version> matching package.json." >&2
          exit 1

  publish:
    runs-on: ubuntu-latest
    needs: guard
    environment: npm-publish
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      # actions/setup-node writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
      # into the generated npmrc. With no NODE_AUTH_TOKEN set (the OIDC state),
      # npm reads that as a configured credential and skips the OIDC trusted-
      # publishing exchange, so the publish fails to authenticate. Strip the line
      # so npm sees no credentials and uses OIDC. See actions/setup-node#1551.
      - name: Remove npm auth placeholder so OIDC is used
        run: |
          if [ -n "$NPM_CONFIG_USERCONFIG" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          fi

      # OIDC trusted publishing requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        run: |
          tag="${GITHUB_REF_NAME#mcp-v}"
          version="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "Tag mcp-v$tag does not match package.json version $version" >&2
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        # No NODE_AUTH_TOKEN: auth is via OIDC trusted publishing. `id-token:
        # write` (set at the top) lets npm exchange a short-lived OIDC token for
        # publish credentials, and provenance is generated automatically.
        env:
          EVENT_NAME: ${{ github.event_name }}
        # Belt-and-braces: any workflow_dispatch publishes with --dry-run, no
        # matter what the dry_run input says. The `guard` job already rejects a
        # dispatch with dry_run=false, but even if that guard is removed this
        # step still cannot make a real release from a dispatch. Real publishes
        # come only from an `mcp-v*` tag push (event_name = push), which is what
        # runs the tag/package.json version check above.
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            npm publish --access public --dry-run
          else
            npm publish --access public --provenance
          fi
